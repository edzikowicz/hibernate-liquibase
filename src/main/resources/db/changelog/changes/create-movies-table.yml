databaseChangeLog:
    - changeSet:
        id: create-countries-table
        author: eugeniusz dzikowicz
        changes:
          - createTable:
              tableName: actors
              columns:
                - column:
                    name: id
                    type: bigint
                    autoIncrement: true
                    constraints:
                      primaryKey: true
                      nullable: false
                - column:
                    name: title
                    type: varchar(256)
                    constraints:
                      nullable: false